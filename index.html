<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#f0b429">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="ConfereSmart">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="favicon.png">
<link rel="icon" type="image/png" sizes="192x192" href="favico.png">
<title>ConfereSmart — Conferência de Pedidos</title>

<style>

:root{--bg:#0d1117;--surface:#161b22;--surface2:#1c2330;--border:#30363d;--accent:#f0b429;--accent2:#22c55e;--danger:#ef4444;--warn:#f97316;--text:#e6edf3;--muted:#7d8590;--mono:ui-monospace,'Cascadia Code','Courier New',monospace;--sans:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;--display:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;--hh:52px;--nh:64px}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--text);font-family:var(--sans)}

/* HEADER */
header{position:fixed;top:0;left:0;right:0;height:var(--hh);background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 14px;gap:10px;z-index:100}
.logo{font-family:var(--display);font-size:17px;font-weight:800;flex-shrink:0}
.logo span{color:var(--accent)}
#abas-container{flex:1;display:flex;align-items:center;gap:5px;overflow-x:auto;padding:3px 0}
#abas-container::-webkit-scrollbar{display:none}
#clock{font-family:var(--mono);font-size:13px;color:var(--accent);font-weight:500;flex-shrink:0}

/* ABAS */
.aba{display:flex;align-items:center;gap:5px;padding:4px 9px;border-radius:6px;border:1px solid var(--border);background:var(--surface2);cursor:pointer;font-size:11px;font-family:var(--mono);white-space:nowrap;color:var(--muted);flex-shrink:0}
.aba-ativa{border-color:var(--accent);background:rgba(240,180,41,.12);color:var(--text)}
.aba-pct{font-size:10px}.aba-ativa .aba-pct{color:var(--accent)}
.aba-close{background:none;border:none;color:var(--muted);cursor:pointer;font-size:14px;padding:0 1px}
.aba-novo{padding:4px 10px;border-radius:6px;border:1px dashed var(--border);background:transparent;color:var(--accent);font-size:11px;font-weight:600;cursor:pointer;white-space:nowrap;font-family:var(--sans);flex-shrink:0}

/* DRAWER OVERLAY */
#drawer-overlay{display:none;position:fixed;top:var(--hh);left:0;right:0;bottom:0;background:rgba(0,0,0,.6);z-index:199}
#drawer-overlay.show{display:block}

/* SIDEBAR DRAWER */
#sidebar{position:fixed;top:var(--hh);left:0;bottom:var(--nh);width:88vw;max-width:340px;background:var(--surface);border-right:1px solid var(--border);overflow-y:auto;z-index:200;transform:translateX(-100%);transition:transform .26s cubic-bezier(.4,0,.2,1);box-shadow:4px 0 32px rgba(0,0,0,.5)}
#sidebar.open{transform:translateX(0)}
#sidebar::-webkit-scrollbar{width:4px}
#sidebar::-webkit-scrollbar-thumb{background:var(--border);border-radius:99px}

.sb-sec{padding:13px 15px;border-bottom:1px solid var(--border)}
.sec-t{font-family:var(--display);font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:9px}

/* Info grid */
.ig{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.ic{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:8px 10px}
.ic .lb{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;margin-bottom:2px}
.ic .vl{font-family:var(--mono);font-size:11px;font-weight:500;word-break:break-all}
.ic.w{grid-column:1/-1}.ic.hl .vl{color:var(--accent);font-size:13px}

/* Inputs */
.cf-inp{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:9px 11px;color:var(--text);font-family:var(--mono);font-size:13px;outline:none;transition:border-color .2s}
.cf-inp:focus{border-color:var(--accent)}
.cf-lbl{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;display:block;margin-bottom:5px}

/* Timer */
.tmr{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:11px;text-align:center}
.tmr-l{font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:3px}
.tmr-v{font-family:var(--mono);font-size:24px;font-weight:500;color:var(--accent);letter-spacing:2px}
.tmr-v.run{color:var(--accent2)}.tmr-v.dn{color:var(--danger)}

/* Progress */
.pb-bg{height:7px;background:var(--surface2);border-radius:99px;overflow:hidden;margin:7px 0 4px}
.pb-fill{height:100%;background:linear-gradient(90deg,var(--accent2),#16a34a);border-radius:99px;transition:width .4s;width:0%}
.ps{display:flex;justify-content:space-between;font-family:var(--mono);font-size:11px}
.ps .dn{color:var(--accent2)}.ps .pc{color:var(--accent);font-weight:500}.ps .tt{color:var(--muted)}

/* Badges */
.br{display:flex;gap:5px;margin-top:7px;flex-wrap:wrap}
.bdg{padding:3px 7px;border-radius:99px;font-size:10px;font-weight:600;font-family:var(--mono);border:1px solid}
.bdg.g{color:var(--accent2);border-color:var(--accent2);background:rgba(34,197,94,.08)}
.bdg.y{color:var(--accent);border-color:var(--accent);background:rgba(240,180,41,.08)}
.bdg.r{color:var(--danger);border-color:var(--danger);background:rgba(239,68,68,.08)}
.bdg.o{color:var(--warn);border-color:var(--warn);background:rgba(249,115,22,.08)}

/* Vol */
.vr{display:flex;align-items:center;gap:8px}
.vr input{width:65px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:7px 9px;color:var(--text);font-family:var(--mono);font-size:14px;text-align:center;outline:none}
.vr input:focus{border-color:var(--accent)}
.vr label{font-size:12px;color:var(--muted)}

/* Obs */
.obs-ta{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:8px 10px;color:var(--text);font-family:var(--sans);font-size:12px;resize:vertical;min-height:60px;outline:none}
.obs-ta:focus{border-color:var(--accent)}

/* Buttons */
.sb-acts{padding:13px 15px;display:flex;flex-direction:column;gap:7px}
.btn{padding:10px 15px;border-radius:8px;border:none;cursor:pointer;font-family:var(--sans);font-size:13px;font-weight:600;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:7px}
.btn:disabled{opacity:.4;cursor:not-allowed}
.btn-p{background:var(--accent);color:#0d1117}
.btn-s{background:var(--accent2);color:#0d1117}
.btn-g{background:transparent;border:1px solid var(--border);color:var(--text)}
.btn-d{background:rgba(239,68,68,.1);border:1px solid var(--danger);color:var(--danger)}

/* MAIN */
#main-area{position:fixed;top:var(--hh);left:0;right:0;bottom:var(--nh);overflow-y:auto;overflow-x:hidden;padding:13px}
#main-area::-webkit-scrollbar{width:5px}
#main-area::-webkit-scrollbar-thumb{background:var(--border);border-radius:99px}

/* BOTTOM NAV */
#bottom-nav{position:fixed;bottom:0;left:0;right:0;height:var(--nh);background:var(--surface);border-top:2px solid var(--border);display:flex;align-items:stretch;z-index:300}
.bn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;background:none;border:none;border-right:1px solid var(--border);cursor:pointer;color:var(--muted);font-size:10px;font-family:var(--sans);font-weight:600;padding:5px 3px;transition:background .15s,color .15s}
.bn:last-child{border-right:none}
.bn:active{background:rgba(255,255,255,.04)}
.bn-ic{font-size:19px;line-height:1.1}
.bn.act{color:var(--accent);background:rgba(240,180,41,.06)}
.bn.grn{color:var(--accent2)}
.bn.grn:disabled{color:var(--muted);opacity:.45;cursor:not-allowed}
.bn.yl{color:var(--accent)}

/* TABELA */
.ih{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:11px;flex-wrap:wrap;gap:7px}
.it{font-family:var(--display);font-size:15px;font-weight:700}
.sb{display:flex;align-items:center;gap:6px;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:7px 11px;flex:1;min-width:0}
.sb:focus-within{border-color:var(--accent)}
.sb input{background:none;border:none;outline:none;color:var(--text);font-family:var(--mono);font-size:13px;width:100%}
.ft{display:flex;gap:4px;flex-wrap:wrap}
.tb{padding:4px 9px;border-radius:99px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:11px;font-weight:500;cursor:pointer;font-family:var(--sans)}
.tb.act{background:var(--accent);border-color:var(--accent);color:#0d1117;font-weight:700}

.tw{border:1px solid var(--border);border-radius:10px;overflow:hidden}
.ir{display:grid;grid-template-columns:38px 1fr 54px 58px;align-items:stretch;border-bottom:1px solid rgba(48,54,61,.5);min-height:56px;cursor:pointer;transition:background .12s}
.ir:hover{background:rgba(255,255,255,.02)}
.ir.ck{background:rgba(34,197,94,.05)}
.ir.dv{background:rgba(239,68,68,.06)}
.ir.hr{background:var(--surface);min-height:32px;cursor:default;position:sticky;top:0;z-index:10}
.ir.hr:hover{background:var(--surface)}
.cel{padding:7px 7px;display:flex;align-items:center;font-size:12px;border-right:1px solid rgba(48,54,61,.3)}
.cel:last-child{border-right:none}
.cel.hd{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--muted)}
.cel.chk{justify-content:center}
.cel.nm{font-family:var(--mono);justify-content:center;font-size:13px;font-weight:600}
.cc{width:26px;height:26px;border-radius:50%;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:13px;transition:all .18s;flex-shrink:0}
.ck .cc{border-color:var(--accent2);background:var(--accent2);color:#0d1117}
.dv .cc{border-color:var(--danger);background:var(--danger);color:#fff}
.qi{width:50px;background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:4px 4px;color:var(--text);font-family:var(--mono);font-size:13px;text-align:center;outline:none}
.qi:focus{border-color:var(--accent)}.qi.ok{border-color:var(--accent2)}.qi.er{border-color:var(--danger)}
.ni{padding:40px;text-align:center;color:var(--muted);font-size:13px}

/* UPLOAD */
#upload-zone{border:2px dashed var(--border);border-radius:14px;padding:36px 20px;text-align:center;cursor:pointer;transition:all .2s;margin:10px auto;max-width:380px}
#upload-zone:hover,#upload-zone.drag-over{border-color:var(--accent);background:rgba(240,180,41,.04)}
.uz-ic{font-size:40px;margin-bottom:12px;opacity:.5}
.uz-t{font-family:var(--display);font-size:17px;font-weight:700;margin-bottom:5px}
.uz-s{font-size:12px;color:var(--muted);line-height:1.6}
#file-input{display:none}

/* RELATÓRIO */
.rw{max-width:660px;margin:0 auto;padding-bottom:20px}
.rs{margin-bottom:16px}
.rs h3{font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:7px;font-weight:700}
.rg{display:grid;grid-template-columns:1fr 1fr;gap:7px}
.ri{background:var(--surface2);border-radius:8px;padding:10px 11px}
.ri .rl{font-size:10px;color:var(--muted);margin-bottom:2px}
.ri .rv{font-family:var(--mono);font-size:13px;font-weight:500}
.rv.g{color:var(--accent2)}.rv.r{color:var(--danger)}.rv.y{color:var(--accent)}
.dl{list-style:none;display:flex;flex-direction:column;gap:5px}
.di{background:rgba(239,68,68,.07);border:1px solid rgba(239,68,68,.2);border-radius:8px;padding:8px 10px;font-size:12px;display:flex;justify-content:space-between;align-items:center;gap:7px}
.dd{flex:1;font-family:var(--sans);font-size:11px}
.dv2{display:flex;gap:7px;white-space:nowrap;font-family:var(--mono);font-size:11px}
.de{color:var(--muted)}.dc{color:var(--danger);font-weight:600}

/* TOAST */
.toast{position:fixed;bottom:calc(var(--nh) + 10px);right:12px;background:var(--surface);border:1px solid var(--accent2);border-radius:10px;padding:9px 14px;font-size:12px;color:var(--accent2);z-index:500;transform:translateY(80px);opacity:0;transition:all .25s;font-family:var(--mono)}
.toast.show{transform:translateY(0);opacity:1}
.toast.warn{border-color:var(--warn);color:var(--warn)}
.toast.error{border-color:var(--danger);color:var(--danger)}

/* HISTÓRICO MODAL */
#hist-modal{display:none;position:fixed;inset:0;z-index:700;background:var(--bg);flex-direction:column}
#hist-modal.open{display:flex}
#hist-header{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;background:var(--surface);border-bottom:1px solid var(--border)}
#hist-title{font-family:var(--display);font-size:17px;font-weight:800}
#hist-title span{color:var(--accent)}
.hist-close{background:rgba(255,255,255,.1);border:none;color:var(--text);font-size:20px;width:34px;height:34px;border-radius:50%;cursor:pointer}
#hist-body{flex:1;overflow-y:auto;padding:14px}
#hist-body::-webkit-scrollbar{width:4px}
#hist-body::-webkit-scrollbar-thumb{background:var(--border);border-radius:99px}
.hc{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:10px}
.hc-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:8px}
.hc-seq{font-family:var(--mono);font-size:13px;font-weight:600;color:var(--accent)}
.hc-dt{font-family:var(--mono);font-size:10px;color:var(--muted)}
.hc-cli{font-size:12px;color:var(--text);margin-bottom:6px}
.hc-stats{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px}
.hc-btn-row{display:flex;gap:6px}
.hc-btn{flex:1;padding:7px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:11px;cursor:pointer;font-family:var(--sans);font-weight:600;transition:all .15s}
.hc-btn:hover{border-color:var(--accent);color:var(--accent)}
.hc-btn.danger{border-color:var(--danger);color:var(--danger)}
.hc-btn.danger:hover{background:rgba(239,68,68,.1)}
.hist-vazio{text-align:center;padding:60px 20px;color:var(--muted)}

/* WHATSAPP MODAL */
#wa-modal{display:none;position:fixed;inset:0;z-index:800;background:rgba(0,0,0,.7);align-items:flex-end;justify-content:center}
#wa-modal.open{display:flex}
#wa-box{background:var(--surface);border-radius:20px 20px 0 0;padding:24px;width:100%;max-width:500px;border-top:1px solid var(--border)}
#wa-title{font-family:var(--display);font-size:16px;font-weight:800;margin-bottom:4px}
#wa-sub{font-size:12px;color:var(--muted);margin-bottom:16px}
#wa-num{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:11px 14px;color:var(--text);font-family:var(--mono);font-size:16px;outline:none;margin-bottom:10px;transition:border-color .2s}
#wa-num:focus{border-color:#25d366}
#wa-preview{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:12px;font-size:12px;color:var(--muted);font-family:var(--mono);white-space:pre-wrap;max-height:160px;overflow-y:auto;margin-bottom:14px;line-height:1.5}
.wa-btns{display:flex;gap:8px}
.wa-btn-send{flex:1;padding:13px;background:#25d366;border:none;border-radius:10px;color:#fff;font-size:15px;font-weight:700;cursor:pointer;font-family:var(--sans)}
.wa-btn-cancel{padding:13px 18px;background:transparent;border:1px solid var(--border);border-radius:10px;color:var(--muted);font-size:14px;cursor:pointer;font-family:var(--sans)}

/* WAKE LOCK indicator */
#wakelock-indicator{position:fixed;top:calc(var(--hh) + 6px);right:10px;background:rgba(34,197,94,.15);border:1px solid var(--accent2);border-radius:99px;padding:3px 8px;font-size:10px;color:var(--accent2);font-family:var(--mono);z-index:150;display:none}

/* Botão WhatsApp no relatório */
.wa-share-btn{display:flex;align-items:center;gap:8px;padding:11px 16px;background:#25d366;border:none;border-radius:10px;color:#fff;font-size:13px;font-weight:700;cursor:pointer;font-family:var(--sans);width:100%;justify-content:center;margin-top:8px}

/* Histórico btn no header sidebar */
.hist-trigger{background:rgba(240,180,41,.1);border:1px solid var(--accent);color:var(--accent);border-radius:8px;padding:7px 12px;font-size:12px;font-weight:600;cursor:pointer;font-family:var(--sans);width:100%;display:flex;align-items:center;gap:6px;justify-content:center}
#scan-modal{display:none;position:fixed;inset:0;z-index:600;background:#000;flex-direction:column}
#scan-modal.open{display:flex}
#scan-header{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:rgba(0,0,0,.7);border-bottom:1px solid rgba(255,255,255,.1);position:relative;z-index:2}
#scan-title{font-family:var(--display);font-weight:800;font-size:16px;color:#fff}
#scan-close{background:rgba(255,255,255,.15);border:none;color:#fff;font-size:22px;width:36px;height:36px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;line-height:1}
#scan-video-wrap{flex:1;position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center;background:#000}
#scan-video{width:100%;height:100%;object-fit:cover}
/* Mira de scan */
.scan-mira{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none;z-index:2}
.scan-box{width:240px;height:140px;position:relative}
.scan-box::before,.scan-box::after,.scan-corner-br,.scan-corner-bl{content:'';position:absolute;width:28px;height:28px;border-color:var(--accent);border-style:solid}
.scan-box::before{top:0;left:0;border-width:3px 0 0 3px;border-radius:4px 0 0 0}
.scan-box::after{top:0;right:0;border-width:3px 3px 0 0;border-radius:0 4px 0 0}
.scan-corner-br{bottom:0;right:0;border-width:0 3px 3px 0;border-radius:0 0 4px 0}
.scan-corner-bl{bottom:0;left:0;border-width:0 0 3px 3px;border-radius:0 0 0 4px}
.scan-laser{position:absolute;top:50%;left:4px;right:4px;height:2px;background:linear-gradient(90deg,transparent,var(--accent),transparent);animation:laser 1.8s ease-in-out infinite;transform:translateY(-50%)}
@keyframes laser{0%,100%{top:12%}50%{top:88%}}
/* Painel inferior do scanner */
#scan-bottom{background:rgba(0,0,0,.85);padding:14px 16px;border-top:1px solid rgba(255,255,255,.1)}
#scan-status{font-family:var(--mono);font-size:13px;color:var(--muted);text-align:center;margin-bottom:10px;min-height:20px}
#scan-last{background:var(--surface2);border-radius:10px;padding:12px;margin-bottom:10px;display:none}
#scan-last .sl-cod{font-family:var(--mono);font-size:13px;color:var(--accent);margin-bottom:4px}
#scan-last .sl-desc{font-size:12px;color:var(--text);line-height:1.4;margin-bottom:6px}
#scan-last .sl-res{font-size:12px;font-weight:600;display:flex;align-items:center;gap:6px}
#scan-last .sl-res.ok{color:var(--accent2)}
#scan-last .sl-res.err{color:var(--danger)}
#scan-last .sl-res.dup{color:var(--warn)}
#scan-last .sl-res.nf{color:var(--muted)}
#scan-counter{display:flex;gap:8px;justify-content:center;flex-wrap:wrap}
.sc-bdg{padding:5px 12px;border-radius:99px;font-size:12px;font-weight:600;font-family:var(--mono);border:1px solid}
.sc-bdg.g{color:var(--accent2);border-color:var(--accent2);background:rgba(34,197,94,.1)}
.sc-bdg.y{color:var(--accent);border-color:var(--accent);background:rgba(240,180,41,.1)}
.sc-bdg.r{color:var(--danger);border-color:var(--danger);background:rgba(239,68,68,.1)}
/* Flash de feedback */
#scan-flash{position:absolute;inset:0;z-index:3;opacity:0;transition:opacity .15s;pointer-events:none}
#scan-flash.ok{background:rgba(34,197,94,.35)}
#scan-flash.err{background:rgba(239,68,68,.35)}
#scan-flash.dup{background:rgba(249,115,22,.35)}
/* Câmera select */
#cam-select{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:7px 10px;color:var(--text);font-size:12px;outline:none;margin-bottom:10px}

/* DESKTOP ≥ 701px */
@media(min-width:701px){
  :root{--hh:60px;--nh:0px}
  html,body{overflow:auto}
  #main-area{position:static;margin-left:320px;height:auto;min-height:calc(100vh - 60px);padding:20px 24px;overflow:visible}
  #sidebar{position:fixed;top:60px;left:0;bottom:0;width:320px;transform:translateX(0)!important;box-shadow:none}
  #bottom-nav{display:none}
  #drawer-overlay{display:none!important}
  .toast{bottom:20px}
  .ir{grid-template-columns:38px 1fr 90px 56px 80px 70px 80px 100px}
}
@media(min-width:901px){
  #sidebar{width:320px}
  #main-area{margin-left:320px}
}
</style>
</head>
<body>

<header>
  <div class="logo">Confere<span>Smart</span></div>
  <div id="abas-container"></div>
  <div id="clock">--:--:--</div>
</header>

<div id="drawer-overlay" onclick="fecharDrawer()"></div>

<aside id="sidebar">
  <div id="sidebar-content"></div>
</aside>

<main id="main-area"></main>

<nav id="bottom-nav">
  <button class="bn" onclick="toggleDrawer()">
    <span class="bn-ic">☰</span><span>Pedido</span>
  </button>
  <button class="bn act" id="bn-itens" onclick="mobileItens()">
    <span class="bn-ic">📋</span><span>Itens</span>
  </button>
  <button class="bn grn" id="bn-ini" disabled onclick="iniciarConferencia()">
    <span class="bn-ic">▶</span><span>Iniciar</span>
  </button>
  <button class="bn" id="bn-scan" style="color:var(--accent);display:none" onclick="abrirScanner()">
    <span class="bn-ic">📷</span><span>Scanner</span>
  </button>
  <button class="bn" id="bn-rel" style="display:none" onclick="mobileRel()">
    <span class="bn-ic">📊</span><span>Relatório</span>
  </button>
  <button class="bn yl" onclick="abrirNovoPedido()">
    <span class="bn-ic">＋</span><span>Novo PDF</span>
  </button>
  <button class="bn" onclick="abrirHistorico()" style="color:var(--muted)">
    <span class="bn-ic">🕘</span><span>Histórico</span>
  </button>
</nav>

<!-- MODAL SCANNER -->
<div id="scan-modal">
  <div id="scan-header">
    <div id="scan-title">📷 Scanner de Código de Barras</div>
    <button id="scan-close" onclick="fecharScanner()">×</button>
  </div>
  <div id="scan-video-wrap">
    <video id="scan-video" playsinline autoplay muted></video>
    <div class="scan-mira">
      <div class="scan-box">
        <div class="scan-corner-br"></div>
        <div class="scan-corner-bl"></div>
        <div class="scan-laser"></div>
      </div>
    </div>
    <div id="scan-flash"></div>
  </div>
  <div id="scan-bottom">
    <select id="cam-select" onchange="trocarCamera(this.value)" style="display:none"></select>

    <!-- Estado: aguardando leitura -->
    <div id="scan-aguardando">
      <div id="scan-status" style="text-align:center;font-family:var(--mono);font-size:13px;color:var(--muted);padding:6px 0">Aponte a câmera para o código de barras</div>
      <!-- Campo de digitação manual — só mostra quando câmera falha ou usuário pede -->
      <div id="div-manual" style="display:none;gap:8px;margin-top:8px">
        <input id="scan-manual-input" type="text" inputmode="numeric"
          placeholder="Digite o código do produto..."
          style="flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:9px 12px;color:var(--text);font-family:var(--mono);font-size:14px;outline:none;min-width:0"
          onkeydown="if(event.key==='Enter')submitManual()"
        />
        <button onclick="submitManual()"
          style="padding:9px 14px;background:var(--accent);border:none;border-radius:8px;color:#0d1117;font-size:13px;font-weight:700;cursor:pointer;white-space:nowrap">
          OK
        </button>
      </div>
      <!-- Botão discreto para abrir teclado manualmente -->
      <div style="text-align:center;margin-top:8px">
        <button id="btn-digitar" onclick="mostrarCampoManual()"
          style="background:transparent;border:1px solid var(--border);border-radius:8px;padding:6px 14px;color:var(--muted);font-size:12px;cursor:pointer;font-family:var(--sans)">
          ⌨ Digitar código manualmente
        </button>
      </div>
    </div>

    <!-- Estado: item lido, aguarda confirmação de qtd -->
    <div id="scan-confirma" style="display:none">
      <div style="display:flex;align-items:flex-start;gap:10px;margin-bottom:10px">
        <div style="flex:1;min-width:0">
          <div id="sc-cod" style="font-family:var(--mono);font-size:11px;color:var(--muted);margin-bottom:2px"></div>
          <div id="sc-desc" style="font-size:13px;font-weight:600;color:var(--text);line-height:1.35;margin-bottom:4px"></div>
          <div id="sc-pedido" style="font-size:12px;color:var(--muted)"></div>
        </div>
        <button onclick="cancelarConfirma()" style="background:rgba(239,68,68,.15);border:1px solid var(--danger);color:var(--danger);border-radius:8px;padding:6px 10px;font-size:12px;cursor:pointer;flex-shrink:0;font-family:var(--sans);font-weight:600">Cancelar</button>
      </div>

      <!-- Input de quantidade + botões rápidos -->
      <div style="background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:12px;margin-bottom:10px">
        <div style="font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px">Quantidade conferida</div>
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px">
          <button onclick="ajustarQtd(-1)" style="width:42px;height:42px;border-radius:50%;border:1px solid var(--border);background:var(--surface);color:var(--text);font-size:22px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0">−</button>
          <input id="sc-qtd-input" type="number" min="0" inputmode="numeric"
            style="flex:1;background:var(--bg);border:2px solid var(--accent);border-radius:10px;padding:10px;color:var(--text);font-family:var(--mono);font-size:26px;font-weight:700;text-align:center;outline:none"
            oninput="syncQtdInput()" />
          <button onclick="ajustarQtd(+1)" style="width:42px;height:42px;border-radius:50%;border:1px solid var(--border);background:var(--surface);color:var(--text);font-size:22px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0">＋</button>
        </div>
        <!-- Atalhos rápidos de quantidade -->
        <div id="sc-qtd-atalhos" style="display:flex;gap:6px;flex-wrap:wrap"></div>
      </div>

      <!-- Botão confirmar -->
      <button onclick="confirmarQtd()" style="width:100%;padding:14px;background:var(--accent2);border:none;border-radius:10px;color:#0d1117;font-size:16px;font-weight:700;cursor:pointer;font-family:var(--sans);display:flex;align-items:center;justify-content:center;gap:8px">
        ✓ Confirmar
      </button>
    </div>

    <!-- Contador sempre visível -->
    <div id="scan-counter" style="display:flex;gap:7px;justify-content:center;flex-wrap:wrap;margin-top:10px">
      <span class="sc-bdg g" id="sc-ok">✓ 0 OK</span>
      <span class="sc-bdg y" id="sc-pend">◌ 0 Pend.</span>
      <span class="sc-bdg r" id="sc-div">⚠ 0 Div.</span>
    </div>
  </div>
</div>

<!-- WAKE LOCK INDICATOR -->
<div id="wakelock-indicator">🔆 Tela fixada</div>

<!-- HISTÓRICO MODAL -->
<div id="hist-modal">
  <div id="hist-header">
    <div id="hist-title">Histórico de <span>Conferências</span></div>
    <button class="hist-close" onclick="fecharHistorico()">×</button>
  </div>
  <div id="hist-body"></div>
</div>

<!-- WHATSAPP MODAL -->
<div id="wa-modal" onclick="if(event.target===this)fecharWA()">
  <div id="wa-box">
    <div id="wa-title">📲 Enviar pelo WhatsApp</div>
    <div id="wa-sub">Informe o número e envie o resumo da conferência</div>
    <input id="wa-num" type="tel" inputmode="numeric" placeholder="Ex: 87991234567 (com DDD)" />
    <div id="wa-preview"></div>
    <div class="wa-btns">
      <button class="wa-btn-cancel" onclick="fecharWA()">Cancelar</button>
      <button class="wa-btn-send" onclick="enviarWA()">📲 Enviar no WhatsApp</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// Captura erros globais — evita tela preta
window.onerror = (msg, src, line, col, err) => {
  const el = document.getElementById('main-area');
  if (el) el.innerHTML = `
    <div style="padding:24px;font-family:sans-serif;color:#e6edf3">
      <div style="font-size:18px;font-weight:800;color:#ef4444;margin-bottom:8px">⚠ Erro ao carregar</div>
      <div style="font-size:13px;color:#7d8590;margin-bottom:12px">${msg}<br>Linha ${line}</div>
      <button onclick="location.reload()" style="background:#f0b429;border:none;border-radius:8px;padding:10px 20px;font-size:14px;font-weight:700;cursor:pointer">🔄 Recarregar</button>
    </div>`;
  return false;
};


// ── ESTADO ──────────────────────────────────────────
let pedidos=[],abaAtiva=null,nextId=1;

// ── CLOCK ───────────────────────────────────────────
setInterval(()=>{document.getElementById('clock').textContent=new Date().toLocaleTimeString('pt-BR')},1000);

// ── DRAWER ──────────────────────────────────────────
function toggleDrawer(){const s=document.getElementById('sidebar'),o=document.getElementById('drawer-overlay');const ab=s.classList.toggle('open');o.classList.toggle('show',ab)}
function fecharDrawer(){document.getElementById('sidebar').classList.remove('open');document.getElementById('drawer-overlay').classList.remove('show')}

// ── BOTTOM NAV HELPERS ──────────────────────────────
window.mobileItens=()=>{fecharDrawer();const p=getPed();if(p){p.view='itens';renderMain()}document.getElementById('bn-itens').classList.add('act')}
window.mobileRel=()=>{fecharDrawer();const p=getPed();if(p&&p.finalizado){p.view='relatorio';renderMain()}}

function atualizarBNs(){
  const p=getPed();
  const bni=document.getElementById('bn-ini'),bnr=document.getElementById('bn-rel'),bns=document.getElementById('bn-scan');
  if(!p){if(bni)bni.disabled=true;if(bnr)bnr.style.display='none';if(bns)bns.style.display='none';return}
  if(bni){bni.disabled=p.iniciado;bni.classList.toggle('grn',!p.iniciado)}
  if(bnr)bnr.style.display=p.finalizado?'flex':'none'
  if(bns)bns.style.display=p.iniciado&&!p.finalizado?'flex':'none'
}

// ── CRIAR PEDIDO ────────────────────────────────────
function criarPedido(dados){
  const id=nextId++;
  pedidos.push({id,pedido:dados,conferencia:dados.itens.map((_,i)=>({idx:i,qtdConferida:'',status:'pendente'})),iniciado:false,finalizado:false,dtInicio:null,dtFim:null,timerInterval:null,filtro:'todos',busca:'',view:'itens',volumes:'',obs:'',conferente:''});
  abaAtiva=id;fecharDrawer();renderAbas();renderSidebar();renderMain();atualizarBNs();
  showToast('Pedido #'+dados.seq+' — '+dados.itens.length+' itens')
}
function getPed(){return pedidos.find(p=>p.id===abaAtiva)||null}

// ── ABAS ────────────────────────────────────────────
function renderAbas(){
  const c=document.getElementById('abas-container');if(!c)return;
  c.innerHTML=pedidos.map(p=>{
    const ok=p.conferencia.filter(c=>c.status==='ok').length,dv=p.conferencia.filter(c=>c.status==='divergente').length;
    const pct=p.pedido.itens.length>0?Math.round((ok+dv)/p.pedido.itens.length*100):0;
    const dot=p.finalizado?'🟢':p.iniciado?'🟡':'⚪';
    return`<div class="aba ${p.id===abaAtiva?'aba-ativa':''}" onclick="trocarAba(${p.id})">${dot} <span style="font-weight:600">#${p.pedido.seq}</span> <span class="aba-pct">${pct}%</span><button class="aba-close" onclick="event.stopPropagation();fecharPedido(${p.id})">×</button></div>`
  }).join('')+`<button class="aba-novo" onclick="abrirNovoPedido()">＋ Novo</button>`
}
window.trocarAba=(id)=>{salvarCampos();abaAtiva=id;fecharDrawer();renderAbas();renderSidebar();renderMain();atualizarBNs()}
window.fecharPedido=(id)=>{const p=pedidos.find(x=>x.id===id);if(p?.iniciado&&!p.finalizado&&!confirm('Pedido em conferência. Fechar?'))return;clearInterval(p?.timerInterval);pedidos=pedidos.filter(x=>x.id!==id);if(abaAtiva===id)abaAtiva=pedidos.length?pedidos[pedidos.length-1].id:null;renderAbas();if(abaAtiva){renderSidebar();renderMain()}else{document.getElementById('sidebar-content').innerHTML='<div style="padding:40px 16px;text-align:center;color:var(--muted);font-size:13px"><div style="font-size:36px;margin-bottom:12px">📋</div>Nenhum pedido.<br><span style="color:var(--accent)">Toque em ＋ Novo PDF</span></div>';renderMainVazio();}atualizarBNs()}
window.abrirNovoPedido=()=>renderMainUpload()

function salvarCampos(){const p=getPed();if(!p)return;const o=document.getElementById('obs-geral'),v=document.getElementById('vol-input'),c=document.getElementById('conferente-input');if(o)p.obs=o.value;if(v)p.volumes=v.value;if(c)p.conferente=c.value}

// ── SIDEBAR ─────────────────────────────────────────
function renderSidebar(){
  const p=getPed();if(!p){document.getElementById('sidebar-content').innerHTML='<div style="padding:40px 16px;text-align:center;color:var(--muted);font-size:13px"><div style="font-size:36px;margin-bottom:12px">📋</div>Nenhum pedido.<br><span style="color:var(--accent)">Toque em ＋ Novo PDF</span></div>';return}
  const ped=p.pedido,ok=p.conferencia.filter(c=>c.status==='ok').length,dv=p.conferencia.filter(c=>c.status==='divergente').length,pend=ped.itens.length-ok-dv,done=ok+dv,pct=ped.itens.length>0?Math.round(done/ped.itens.length*100):0;
  const stC=p.finalizado?'var(--accent2)':p.iniciado?'var(--warn)':'var(--accent)';
  const stT=p.finalizado?'✓ Finalizado':p.iniciado?'⏱ Em conferência':'Pronto para conferir';
  document.getElementById('sidebar-content').innerHTML=`
    <div class="sb-sec"><div class="sec-t">Conferente</div><label class="cf-lbl">Nome</label><input id="conferente-input" class="cf-inp" type="text" placeholder="Digite seu nome..." value="${p.conferente||''}" ${p.iniciado?'disabled':''} onchange="salvarC(this.value)"></div>
    <div class="sb-sec"><div class="sec-t">Pedido</div><div class="ig">
      <div class="ic w hl"><div class="lb">Sequência</div><div class="vl">#${ped.seq}</div></div>
      <div class="ic w"><div class="lb">Status</div><div class="vl" style="color:${stC}">${stT}</div></div>
      <div class="ic w"><div class="lb">Cliente</div><div class="vl">${ped.cliente}</div></div>
      <div class="ic"><div class="lb">Vendedor</div><div class="vl">${ped.vendedor}</div></div>
      <div class="ic"><div class="lb">Total</div><div class="vl" style="color:var(--accent2)">R$${ped.total.toFixed(2)}</div></div>
      <div class="ic"><div class="lb">Data</div><div class="vl">${ped.data}</div></div>
      <div class="ic"><div class="lb">Cidade</div><div class="vl">${ped.cidade}/${ped.uf}</div></div>
    </div></div>
    <div class="sb-sec"><div class="sec-t">Cronômetro</div>
      <div class="tmr"><div class="tmr-l" id="tmr-l">${p.finalizado?'Finalizado':'Aguardando início'}</div><div class="tmr-v ${p.iniciado&&!p.finalizado?'run':p.finalizado?'dn':''}" id="tmr-v">${calcT(p)}</div></div>
      <div class="br" id="t-bdg">${tBdg(p)}</div>
    </div>
    <div class="sb-sec"><div class="sec-t">Progresso</div>
      <div class="pb-bg"><div class="pb-fill" id="pb-fill" style="width:${pct}%"></div></div>
      <div class="ps"><span class="dn" id="ps-dn">${done} conf.</span><span class="pc" id="ps-pc">${pct}%</span><span class="tt" id="ps-tt">${ped.itens.length} itens</span></div>
      <div class="br" id="st-bdg">${stBdg(ok,dv,pend)}</div>
    </div>
    <div class="sb-sec"><div class="sec-t">Volumes Conferidos</div>
      <div class="vr"><input type="number" id="vol-input" min="1" placeholder="0" value="${p.volumes||''}" onchange="salvarV(this.value)"><label>volumes no pedido</label></div>
    </div>
    <div class="sb-sec"><div class="sec-t">Observações</div>
      <textarea class="obs-ta" id="obs-geral" placeholder="Anotações..." onchange="salvarO(this.value)">${p.obs||''}</textarea>
    </div>
    <div class="sb-acts">
      <button class="btn btn-p" ${p.iniciado?'disabled':''} onclick="iniciarConferencia()">▶ Iniciar Conferência</button>
      <button class="btn btn-s" ${!p.iniciado||p.finalizado?'disabled':''} onclick="finalizarConferencia()">✓ Finalizar e Ver Relatório</button>
      ${p.finalizado?`<button class="btn btn-g" onclick="toggleView()">${p.view==='relatorio'?'← Ver Itens':'📊 Ver Relatório'}</button>`:''}
      <button class="btn btn-d" onclick="resetarPedido(${p.id})">↺ Resetar</button>
    </div>`
}

function calcT(p){if(!p.dtInicio)return'00:00:00';const d=Math.floor(((p.dtFim||new Date())-p.dtInicio)/1000);return[Math.floor(d/3600),Math.floor(d%3600/60),d%60].map(v=>String(v).padStart(2,'0')).join(':')}
function tBdg(p){if(!p.dtFim)return'';const d=Math.floor((p.dtFim-p.dtInicio)/1000);return`<span class="bdg y">⏱ ${Math.floor(d/60)}m ${d%60}s</span><span class="bdg g">${p.dtInicio.toLocaleTimeString('pt-BR')}</span><span class="bdg o">${p.dtFim.toLocaleTimeString('pt-BR')}</span>`}
function stBdg(ok,dv,pend){return`${ok>0?`<span class="bdg g">✓ ${ok} OK</span>`:''}${dv>0?`<span class="bdg r">⚠ ${dv} Div.</span>`:''}${pend>0?`<span class="bdg y">◌ ${pend} Pend.</span>`:''}`}

window.salvarC=v=>{const p=getPed();if(p)p.conferente=v};
window.salvarV=v=>{const p=getPed();if(p)p.volumes=v};
window.salvarO=v=>{const p=getPed();if(p)p.obs=v};

// ── MAIN ────────────────────────────────────────────
function renderMain(){const p=getPed();if(!p){renderMainVazio();return}p.view==='relatorio'?renderRel():renderTabela()}
function renderMainVazio(){document.getElementById('main-area').innerHTML=`<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:14px;color:var(--muted);text-align:center;padding:20px"><div style="font-size:48px">📦</div><div style="font-size:15px;font-weight:600">Nenhum pedido aberto</div><div style="font-size:13px">Toque em <span style="color:var(--accent)">＋ Novo PDF</span> para começar</div></div>`}
function renderMainUpload(){
  document.getElementById('main-area').innerHTML=`
    <div id="upload-zone"><div class="uz-ic">📋</div><div class="uz-t">Carregar Pedido DAV</div><div class="uz-s">Toque aqui ou arraste o PDF do pedido<br><span style="font-size:11px;opacity:.6">DAV — Documento Auxiliar de Venda</span></div><input type="file" id="file-input" accept=".pdf"/></div>
    <div style="text-align:center;margin:10px 0;color:var(--muted);font-size:12px"></div>
    <div style="text-align:center;display:flex;flex-direction:column;gap:10px;align-items:center">
      ${abaAtiva?`<button class="btn btn-g" style="width:100%;max-width:340px;color:var(--muted);font-size:12px" onclick="cancelarUpload()">← Cancelar</button>`:''}
    </div>`;
  attachUpload()
}
window.cancelarUpload=()=>renderMain()

// ── TABELA ──────────────────────────────────────────
function renderTabela(){
  const p=getPed();if(!p)return;
  const fil=getFil(p);
  document.getElementById('main-area').innerHTML=`
    <div class="ih">
      <div><div class="it">#${p.pedido.seq} · ${p.pedido.itens.length} itens</div><div style="font-size:11px;color:var(--muted);font-family:var(--mono)">R$ ${p.pedido.total.toFixed(2)} · ${p.pedido.cliente.split(' ').slice(0,2).join(' ')}</div></div>
      <div class="sb"><span style="color:var(--muted);font-size:13px">🔍</span><input type="text" placeholder="Buscar..." value="${p.busca}" oninput="setBusca(this.value)"/></div>
      <div class="ft">
        <button class="tb ${p.filtro==='todos'?'act':''}" onclick="setFiltro('todos')">Todos</button>
        <button class="tb ${p.filtro==='pendente'?'act':''}" onclick="setFiltro('pendente')">Pend.</button>
        <button class="tb ${p.filtro==='ok'?'act':''}" onclick="setFiltro('ok')">✓ OK</button>
        <button class="tb ${p.filtro==='divergente'?'act':''}" onclick="setFiltro('divergente')">⚠ Div.</button>
      </div>
    </div>
    <div class="tw">
      <div class="ir hr"><div class="cel chk hd">✓</div><div class="cel hd">Descrição / Código</div><div class="cel nm hd">Ped.</div><div class="cel nm hd">Conf.</div></div>
      ${fil.length===0?`<div class="ni">Nenhum item encontrado</div>`:fil.map(({item,conf,idx})=>rowH(p,item,conf,idx)).join('')}
    </div>`
}

function rowH(p,item,conf,idx){
  const cls=conf.status==='ok'?'ck':conf.status==='divergente'?'dv':'';
  const icon=conf.status==='ok'?'✓':conf.status==='divergente'?'!':'';
  const dis=!p.iniciado||p.finalizado?'disabled':'';
  const qcls=conf.status==='ok'?'ok':conf.status==='divergente'?'er':'';
  const cli=p.iniciado&&!p.finalizado?`marcarItem(${idx})`:'';
  return`<div class="ir ${cls}" id="row-${idx}">
    <div class="cel chk" onclick="${cli}"><div class="cc">${icon}</div></div>
    <div class="cel" onclick="${cli}" style="flex-direction:column;align-items:flex-start;gap:2px">
      <div style="font-size:12px;font-weight:500;line-height:1.3">${item.desc}</div>
      <div style="font-size:10px;color:var(--muted);font-family:var(--mono)">${item.cod} · ${item.und}</div>
    </div>
    <div class="cel nm">${item.qtd}</div>
    <div class="cel nm"><input class="qi ${qcls}" type="number" min="0" value="${conf.qtdConferida}" placeholder="${item.qtd}" ${dis} onchange="setQtd(${idx},this.value)" onclick="event.stopPropagation()"/></div>
  </div>`
}

async function extrairTextoPDF(file) {
  if (!window.pdfjsLib) {
    try {
      await Promise.race([
        carregarScript('https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js'),
        new Promise((_,reject) => setTimeout(() => reject(new Error('timeout')), 8000))
      ]);
      if (window.pdfjsLib) {
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
      }
    } catch(e) {
      throw new Error('Sem conexão com a internet. Conecte-se para carregar PDFs.');
    }
  }
  if (!window.pdfjsLib) throw new Error('Leitor de PDF não carregou. Verifique sua conexão.');

  const arrayBuffer = await file.arrayBuffer();
  const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
  let textoTotal = '';

  for (let pg = 1; pg <= pdf.numPages; pg++) {
    const page = await pdf.getPage(pg);
    const content = await page.getTextContent();
    const mapa = new Map();
    for (const item of content.items) {
      const y = Math.round(item.transform[5]);
      const x = Math.round(item.transform[4]);
      const txt = item.str;
      if (!txt.trim()) continue;
      if (!mapa.has(y)) mapa.set(y, []);
      mapa.get(y).push({ x, txt });
    }
    const linhasY = [...mapa.keys()].sort((a, b) => b - a);
    for (const y of linhasY) {
      const celulas = mapa.get(y).sort((a, b) => a.x - b.x);
      textoTotal += celulas.map(c => c.txt).join(' ') + '\n';
    }
  }
  return textoTotal;
}

function carregarScript(src) {
  return new Promise((resolve, reject) => {
    if (document.querySelector(`script[src="${src}"]`)) { resolve(); return; }
    const s = document.createElement('script');
    s.src = src; s.onload = resolve; s.onerror = reject;
    document.head.appendChild(s);
  });
}

function parsearDAV(texto) {
  const linhas = texto.split('\n').map(l => l.trim());

  // ── CABEÇALHO ────────────────────────────────────────────────────────────
  let seq='', cliente='', vendedor='', cidade='', uf='', data='', hora='', total=0;

  // No pdf.js tudo vem numa linha só por item do cabeçalho
  for (const l of linhas) {
    // Sequência: linha isolada com 6-8 dígitos
    if (/^\d{6,8}$/.test(l) && !seq) { seq = l; continue; }

    // "SEQ. GERAL:" + próxima linha com número — já capturado acima
    // ou inline
    const mSeqInline = l.match(/SEQ\.\s*(?:GERAL)?[:\s]+(\d{6,8})/i);
    if (mSeqInline && !seq) seq = mSeqInline[1];

    // Data e hora
    const mDt = l.match(/(\d{2}\/\d{2}\/\d{4})/);
    if (mDt && !data) data = mDt[1];
    const mHr = l.match(/(\d{2}:\d{2}:\d{2})/);
    if (mHr && !hora) hora = mHr[1];

    // Cliente e Vendedor na mesma linha:
    // "CLIENTE: 19372 NOME VERDEDOR: 5608 F5 JONAS"
    const mCV = l.match(/CLIENTE[:\s]+\d+\s+(.+?)\s+VE[RN]D[EI]?D?OR[:\s]+\d+\s+(.+)/i);
    if (mCV) {
      if (!cliente) cliente = mCV[1].trim();
      if (!vendedor) vendedor = mCV[2].replace(/\s+\d{2}\/\d{2}.*/,'').trim();
    }
    // Só cliente
    if (!cliente) {
      const mC = l.match(/CLIENTE[:\s]+\d+\s+(.+)/i);
      if (mC) cliente = mC[1].replace(/\s+VE[RN]D.*/i,'').replace(/\s+ENDER.*/i,'').trim();
    }
    // Só vendedor
    if (!vendedor) {
      const mV = l.match(/VE[RN]D[EI]?D?OR[:\s]+\d+\s+(.+)/i);
      if (mV) vendedor = mV[1].replace(/\s+\d{2}\/\d{2}.*/,'').trim();
    }

    // Cidade/UF
    if (!cidade) {
      const mCid = l.match(/CIDADE[:\s]+(.+?)\s+UF[:\s]+([A-Z]{2})/i);
      if (mCid) { cidade = mCid[1].trim(); uf = mCid[2]; }
    }

    // Total a pagar
    const mTot = l.match(/TOTAL\s+A\s+PAGAR[:\s]+([\d.,]+)/i);
    if (mTot) total = pFloat(mTot[1]);
  }

  // Fallback cliente no rodapé "10249 - NOME VENDEDOR:"
  if (!cliente) {
    const m = texto.match(/\d{4,6}\s+-\s+([A-ZÁÉÍÓÚ][^\n]{3,60}?)(?:\s+VENDEDOR|\n)/i);
    if (m) cliente = m[1].trim();
  }

  // ── ITENS ────────────────────────────────────────────────────────────────
  // No pdf.js cada item vem assim (tudo numa linha):
  // "7891020009028 ___ AG DARNING COATS 06 C/20UNDS CA 10 4,25 4,99 4,04 40,38"
  // Ou sem traços:
  // "7898707261571 L. CARRIELLE 120 C/1.500MTS 0804 MARINHO CN 24 3,25 3,00 3,15 75,66"
  // Ocasionalmente o código aparece sem traços seguido de desc+valores:
  // "7894798998099 FIO BEL 70G 1081 NUDE CN 6 3,99 5,01 3,79 22,74"

  const UNDS = ['PC','UN','CA','RL','CX','NV','CN','PA','KG','MT','PR','JG','PT','GR','LT','FR','TB','PÇ','FD','DZ','ML','RS','VD'];
  const UNDS_SET = new Set(UNDS);
  const reUnds = UNDS.join('|');

  // Regex que captura: código + desc + und + qtd + punit + d% + pfinal + vtotal
  // Aceita traços ___ entre código e desc
  const reItem = new RegExp(
    '^(\\d{5,14})' +                          // código
    '(?:\\s+[_]+)?\\s+' +                      // traços opcionais
    '(.+?)\\s+' +                              // descrição (lazy)
    `(${reUnds})\\s+` +                        // unidade
    '(\\d{1,4})\\s+' +                         // quantidade
    '([\\d.,]+)\\s+' +                         // p.unit
    '([\\d.,]+)\\s+' +                         // d%
    '([\\d.,]+)\\s+' +                         // p.final
    '([\\d.,]+)\\s*$',                         // v.total
    'i'
  );

  // Regex simplificado para linhas sem todos os preços
  const reItemMin = new RegExp(
    '^(\\d{5,14})' +
    '(?:\\s+[_]+)?\\s+' +
    '(.+?)\\s+' +
    `(${reUnds})\\s+` +
    '(\\d{1,4})\\s+' +
    '([\\d.,]+)',
    'i'
  );

  const itens = [];
  const vistoItens = new Map();

  // Linha de cabeçalho das colunas — ignora
  const ignorar = /^(DAV|NÃO|DOCUMENTO|CÓDIGO\s+DESCRIÇÃO|CONFERIDO|SUB.TOTAL|TOTAL|TICKET|OBS|EMBALAGEM|BOLSA|CAIXA|ORÇAMENTO|CONTINUA|Nº PÁG|_+|^\s*$)/i;

  for (const l of linhas) {
    if (ignorar.test(l)) continue;
    if (!/^\d{5,14}/.test(l)) continue; // linha deve começar com código

    // Tenta regex completo primeiro
    let m = l.match(reItem);
    if (m) {
      const cod   = m[1];
      const desc  = m[2].replace(/[_]{3,}/g,'').trim();
      const und   = m[3].toUpperCase();
      const qtd   = parseInt(m[4]);
      const punit = pFloat(m[7]); // p.final como preço unitário
      const vt    = pFloat(m[8]);

      if (qtd > 0) {
        if (vistoItens.has(cod)) {
          const it = vistoItens.get(cod);
          it.qtd += qtd; it.total += vt;
        } else {
          const it = { cod, desc, und, qtd, punit, total: vt };
          vistoItens.set(cod, it); itens.push(it);
        }
      }
      continue;
    }

    // Tenta regex mínimo
    m = l.match(reItemMin);
    if (m) {
      const cod  = m[1];
      const desc = m[2].replace(/[_]{3,}/g,'').trim();
      const und  = m[3].toUpperCase();
      const qtd  = parseInt(m[4]);
      const punit= pFloat(m[5]);

      if (qtd > 0) {
        if (vistoItens.has(cod)) {
          const it = vistoItens.get(cod);
          it.qtd += qtd; it.total += qtd * punit;
        } else {
          const it = { cod, desc, und, qtd, punit, total: qtd * punit };
          vistoItens.set(cod, it); itens.push(it);
        }
      }
    }
  }

  if (itens.length === 0) return null;
  if (!total) total = itens.reduce((s,x) => s + x.total, 0);

  return {
    seq:      seq      || '?',
    data:     data     || new Date().toLocaleDateString('pt-BR'),
    hora:     hora     || '',
    cliente:  cliente  || 'Cliente não identificado',
    vendedor: vendedor || 'Vendedor não identificado',
    cidade:   cidade   || '',
    uf:       uf       || '',
    total,
    itens
  };
}
// Converte string numérica pt-BR para float
function pFloat(s) {
  if (!s) return 0;
  s = String(s).trim();
  if (s.includes(',')) return parseFloat(s.replace(/\./g,'').replace(',','.')) || 0;
  return parseFloat(s) || 0;
}

// Som de bip (beep sintético via Web Audio API)
function beep(freq=880, dur=80, vol=0.3, tipo='ok') {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.frequency.value = tipo==='ok' ? 880 : tipo==='dup' ? 660 : 440;
    osc.type = 'square';
    gain.gain.setValueAtTime(vol, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + dur/1000);
    osc.start(); osc.stop(ctx.currentTime + dur/1000);
    setTimeout(()=>ctx.close(), dur+100);
  } catch(e){}
}

}

async function abrirScanner() {
  const p = getPed();
  if (!p || !p.iniciado || p.finalizado) return;

  const modal = document.getElementById('scan-modal');
  modal.classList.add('open');
  scannerAtivo = true;

  atualizarContadorScan(p);
  confirmandoIdx = null;
  ultimoCod = ''; ultimoTs = 0;
  document.getElementById('scan-confirma').style.display  = 'none';
  document.getElementById('scan-aguardando').style.display = 'block';
  document.getElementById('scan-status').textContent = 'Iniciando câmera...';
  // Campo manual começa escondido
  const divM = document.getElementById('div-manual');
  const btnD = document.getElementById('btn-digitar');
  if (divM) divM.style.display = 'none';
  if (btnD) btnD.style.display = 'block';

  try {
    // Tenta carregar ZXing se não estiver disponível ainda
    if (!window.ZXing) {
      await new Promise(resolve => {
        const s = document.createElement('script');
        s.src = 'https://cdnjs.cloudflare.com/ajax/libs/zxing-js/0.21.1/zxing.min.js';
        s.onload = resolve; s.onerror = resolve;
        document.head.appendChild(s);
      });
    }

    if (window.ZXing) {
      await iniciarZXing();
    } else {
      await iniciarBarcodeDetector();
    }
  } catch(e) {
    const msg = e.message || String(e);
    const isPerm = /permission|denied|not allowed/i.test(msg);
    const statusEl = document.getElementById('scan-status');
    if (isPerm) {
      statusEl.innerHTML = `<span style="color:var(--danger)">⚠ Câmera bloqueada</span><br>
        <span style="font-size:11px;color:var(--muted)">
          Abra o app pelo link:<br>
          <strong style="color:var(--accent)">jonas-filho.github.io/confresmart</strong><br>
          e permita o acesso à câmera.
        </span>`;
    } else {
      statusEl.textContent = '⚠ Câmera indisponível — use o campo abaixo';
    }
    // Mostra campo manual automaticamente quando câmera falha
    mostrarCampoManual();
  }
}

async function iniciarZXing() {
  codeReader = new ZXing.BrowserMultiFormatReader();

  // Lista câmeras disponíveis
  const cameras = await ZXing.BrowserMultiFormatReader.listVideoInputDevices();
  const select = document.getElementById('cam-select');

  if (cameras.length > 1) {
    select.style.display = 'block';
    select.innerHTML = cameras.map((c,i) => `<option value="${c.deviceId}">${c.label || 'Câmera ' + (i+1)}</option>`).join('');
    // Prefere câmera traseira
    const traseira = cameras.find(c => /back|rear|traseira|environment/i.test(c.label));
    if (traseira) select.value = traseira.deviceId;
  }

  const deviceId = select.value || undefined;
  document.getElementById('scan-status').textContent = 'Aponte para o código de barras';

  await codeReader.decodeFromVideoDevice(deviceId, 'scan-video', (result, err) => {
    if (!scannerAtivo) return;
    if (result) {
      processarCodigo(result.getText());
    }
  });
}

async function iniciarBarcodeDetector() {
  if (!('BarcodeDetector' in window)) {
    throw new Error('Leitor de código de barras não suportado neste dispositivo. Use Chrome no Android.');
  }

  const detector = new BarcodeDetector({
    formats: ['ean_13', 'ean_8', 'code_128', 'code_39', 'upc_a', 'upc_e', 'qr_code']
  });

  const constraints = {
    video: { facingMode: { ideal: 'environment' }, width: { ideal: 1280 }, height: { ideal: 720 } }
  };

  streamAtivo = await navigator.mediaDevices.getUserMedia(constraints);
  const video = document.getElementById('scan-video');
  video.srcObject = streamAtivo;
  await video.play();

  document.getElementById('scan-status').textContent = 'Aponte para o código de barras';

  async function detectLoop() {
    if (!scannerAtivo) return;
    try {
      const barcodes = await detector.detect(video);
      if (barcodes.length > 0) {
        processarCodigo(barcodes[0].rawValue);
      }
    } catch(e) {}
    if (scannerAtivo) requestAnimationFrame(detectLoop);
  }
  detectLoop();
}

window.trocarCamera = async (deviceId) => {
  if (!codeReader) return;
  try {
    await codeReader.decodeFromVideoDevice(deviceId, 'scan-video', (result) => {
      if (result && scannerAtivo) processarCodigo(result.getText());
    });
  } catch(e) {}
};

// ── estado de confirmação pendente ──────────────────
let confirmandoIdx = null; // índice do item aguardando confirmação

function processarCodigo(cod) {
  // Se já tem um item aguardando confirmação, ignora novas leituras
  if (confirmandoIdx !== null) return;

  const agora = Date.now();
  if (cod === ultimoCod && agora - ultimoTs < COOLDOWN) return;
  ultimoCod = cod; ultimoTs = agora;

  const p = getPed(); if (!p) return;

  const idx = p.pedido.itens.findIndex(item =>
    item.cod === cod || item.cod === cod.replace(/^0+/, '')
  );

  if (idx === -1) {
    // Não encontrado
    beep(440, 200, 0.4, 'err');
    flashFeedback('err');
    document.getElementById('scan-status').textContent = '❌ Código não encontrado no pedido: ' + cod;
    return;
  }

  const item = p.pedido.itens[idx];
  const conf = p.conferencia[idx];

  // Item já conferido como OK → permite somar mais (rebipe)
  if (conf.status === 'ok') {
    beep(660, 80, 0.2, 'dup');
    flashFeedback('dup');
    // Abre confirma em modo "adicionar mais"
    abrirConfirma(idx, true);
    return;
  }

  // Item encontrado e ainda não conferido → abre painel de confirmação
  beep(880, 60, 0.2, 'ok');
  abrirConfirma(idx, false);
}


let confirmandoModoAdicionar = false;

function abrirConfirma(idx, modoAdicionar) {
  modoAdicionar = modoAdicionar || false;
  confirmandoIdx = idx;
  const p = getPed();
  const item = p.pedido.itens[idx];
  const conf = p.conferencia[idx];
  const jaConferido = typeof conf.qtdConferida === 'number' && conf.qtdConferida > 0 ? conf.qtdConferida : 0;
  const faltando = Math.max(0, item.qtd - jaConferido);

  document.getElementById('sc-cod').textContent  = item.cod + ' · ' + item.und;
  document.getElementById('sc-desc').textContent = item.desc;

  if (modoAdicionar && jaConferido > 0) {
    document.getElementById('sc-pedido').innerHTML =
      'Pedido: <strong>' + item.qtd + ' ' + item.und + '</strong> &nbsp;·&nbsp; ' +
      'Já conf.: <span style="color:var(--accent2)">' + jaConferido + '</span> &nbsp;·&nbsp; ' +
      'Faltando: <span style="color:var(--warn)">' + faltando + '</span>';
    document.getElementById('sc-qtd-input').value = faltando > 0 ? faltando : 1;
  } else {
    document.getElementById('sc-pedido').textContent =
      'Pedido: ' + item.qtd + ' ' + item.und +
      (jaConferido > 0 ? ' · Anterior: ' + jaConferido : '');
    document.getElementById('sc-qtd-input').value = jaConferido > 0 ? jaConferido : item.qtd;
  }

  // Atalhos rápidos
  const atalhos = new Set([1, item.qtd]);
  if (faltando > 0 && faltando !== item.qtd) atalhos.add(faltando);
  if (item.qtd > 1) atalhos.add(item.qtd - 1);
  if (item.qtd < 20) atalhos.add(item.qtd + 1);
  [2,3,5,10,12,24].forEach(function(v){ if (v <= item.qtd + 5) atalhos.add(v); });

  document.getElementById('sc-qtd-atalhos').innerHTML = Array.from(atalhos).sort(function(a,b){return a-b}).map(function(v){
    var isFaltando = v === faltando && faltando > 0 && modoAdicionar;
    var isEsperado = v === item.qtd;
    var cor    = isFaltando ? 'var(--warn)' : isEsperado ? 'var(--accent2)' : 'var(--muted)';
    var bg     = isFaltando ? 'rgba(249,115,22,.15)' : isEsperado ? 'rgba(34,197,94,.15)' : 'var(--surface)';
    var border = isFaltando ? 'var(--warn)' : isEsperado ? 'var(--accent2)' : 'var(--border)';
    return '<button onclick="setQtdRapida(' + v + ')" style="padding:6px 12px;border-radius:8px;border:1px solid ' + border + ';background:' + bg + ';color:' + cor + ';font-family:var(--mono);font-size:13px;font-weight:600;cursor:pointer">' + v + (isFaltando ? ' (falta)' : '') + '</button>';
  }).join('');

  // Botão confirmar muda o texto
  var btnConf = document.querySelector('#scan-confirma button[onclick="confirmarQtd()"]');
  if (btnConf) btnConf.textContent = (modoAdicionar && jaConferido > 0) ? '✓ Somar ao conferido' : '✓ Confirmar';

  confirmandoModoAdicionar = modoAdicionar && jaConferido > 0;

  document.getElementById('scan-aguardando').style.display = 'none';
  document.getElementById('scan-confirma').style.display  = 'block';

  setTimeout(function(){
    var inp = document.getElementById('sc-qtd-input');
    inp.focus(); inp.select();
  }, 100);
}


window.ajustarQtd = (delta) => {
  const inp = document.getElementById('sc-qtd-input');

  inp.value = val;
};

window.syncQtdInput = () => {
  // atualiza visual dos atalhos ao digitar manualmente
  if (confirmandoIdx === null) return;
  const p = getPed(); if (!p) return;
  const item = p.pedido.itens[confirmandoIdx];
  const val = parseInt(document.getElementById('sc-qtd-input').value) || 0;
  document.querySelectorAll('#sc-qtd-atalhos button').forEach(btn => {
    const bv = parseInt(btn.textContent.trim());
    const isEsperado = bv === item.qtd;
    const isAtivo = bv === val;
    btn.style.borderColor = isAtivo ? 'var(--accent)' : isEsperado ? 'var(--accent2)' : 'var(--border)';
    btn.style.background  = isAtivo ? 'rgba(240,180,41,.15)' : isEsperado ? 'rgba(34,197,94,.15)' : 'var(--surface)';
    btn.style.color       = isAtivo ? 'var(--accent)' : isEsperado ? 'var(--accent2)' : 'var(--muted)';
  });
};

window.confirmarQtd = () => {
  if (confirmandoIdx === null) return;
  const p = getPed(); if (!p) return;
  const idx  = confirmandoIdx;
  const item = p.pedido.itens[idx];
  const conf = p.conferencia[idx];
  const qtdDigitada = parseInt(document.getElementById('sc-qtd-input').value) || 0;

  // SOMA se estiver em modo adicionar, SUBSTITUI se for primeira conferência
  if (confirmandoModoAdicionar) {
    const jaConferido = typeof conf.qtdConferida === 'number' ? conf.qtdConferida : 0;
    conf.qtdConferida = jaConferido + qtdDigitada;
  } else {
    conf.qtdConferida = qtdDigitada;
  }

  // Define status com base no total acumulado
  const totalConferido = conf.qtdConferida;
  conf.status = totalConferido === item.qtd ? 'ok' : totalConferido > 0 ? 'divergente' : 'pendente';

  if (conf.status === 'ok') {
    beep(880, 120, 0.35, 'ok');
    flashFeedback('ok');
    if (navigator.vibrate) navigator.vibrate(80);
    document.getElementById('scan-status').textContent = '✓ OK — ' + totalConferido + '/' + item.qtd + ' ' + item.und;
  } else if (conf.status === 'divergente') {
    const faltando = item.qtd - totalConferido;
    if (faltando > 0) {
      // Ainda faltam itens — avisa mas não fecha
      beep(660, 80, 0.2, 'dup');
      flashFeedback('dup');
      if (navigator.vibrate) navigator.vibrate(40);
      document.getElementById('scan-status').textContent =
        '📦 ' + totalConferido + '/' + item.qtd + ' — faltam ' + faltando + ' ' + item.und;
    } else {
      // Excedeu — alerta
      beep(440, 200, 0.4, 'err');
      flashFeedback('err');
      if (navigator.vibrate) navigator.vibrate([80,40,80]);
      document.getElementById('scan-status').textContent =
        '⚠ Excedido: ' + totalConferido + ' (pedido: ' + item.qtd + ')';
    }
  }

  atualizarProg(p);
  atualizarContadorScan(p);
  confirmandoModoAdicionar = false;

  // Atualiza linha na tabela
  const row = document.getElementById('row-' + idx);
  if (row) {
    const d = document.createElement('div');
    d.innerHTML = rowH(p, item, conf, idx);
    row.replaceWith(d.firstElementChild);
  }

  fecharConfirma();
};

function atualizarContadorScan(p) {
  const ok   = p.conferencia.filter(c=>c.status==='ok').length;
  const dv   = p.conferencia.filter(c=>c.status==='divergente').length;
  const pend = p.pedido.itens.length - ok - dv;
  const okEl   = document.getElementById('sc-ok');
  const pendEl = document.getElementById('sc-pend');
  const divEl  = document.getElementById('sc-div');
  if(okEl)   okEl.textContent   = `✓ ${ok} OK`;
  if(pendEl) pendEl.textContent = `◌ ${pend} Pend.`;
  if(divEl)  divEl.textContent  = `⚠ ${dv} Div.`;

function fecharScanner() {

  if (codeReader) { try { codeReader.reset(); } catch(e){} codeReader = null; }

// ── WAKE LOCK (tela acesa durante conferência) ───────
let wakeLock = null;
async function ativarWakeLock() {
  if (!('wakeLock' in navigator)) return;
  try {
    wakeLock = await navigator.wakeLock.request('screen');
    document.getElementById('wakelock-indicator').style.display = 'block';
    wakeLock.addEventListener('release', () => {
      document.getElementById('wakelock-indicator').style.display = 'none';
    });
  } catch(e) {}
}
async function liberarWakeLock() {
  if (wakeLock) { await wakeLock.release(); wakeLock = null; }
  document.getElementById('wakelock-indicator').style.display = 'none';
}
// Reativa WakeLock se a página voltar ao foco
document.addEventListener('visibilitychange', async () => {
  if (document.visibilityState === 'visible') {
    const p = getPed();
    if (p && p.iniciado && !p.finalizado) await ativarWakeLock();
  }
});

// ── HISTÓRICO (localStorage) ─────────────────────────
const HIST_KEY = 'conferesmart_historico';

function salvarNoHistorico(p) {
  const hist = carregarHistorico();
  const ped = p.pedido;
  const ok   = p.conferencia.filter(c=>c.status==='ok').length;
  const dv   = p.conferencia.filter(c=>c.status==='divergente').length;
  const pend = p.conferencia.filter(c=>c.status==='pendente').length;
  const diff = p.dtFim && p.dtInicio ? Math.floor((p.dtFim - p.dtInicio)/1000) : 0;

  hist.unshift({
    id: Date.now(),
    seq: ped.seq,
    cliente: ped.cliente,
    vendedor: ped.vendedor,
    total: ped.total,
    conferente: p.conferente,
    dtInicio: p.dtInicio?.toISOString(),
    dtFim: p.dtFim?.toISOString(),
    duracao: diff,
    totalItens: ped.itens.length,
    ok, dv, pend,
    volumes: p.volumes,
    obs: p.obs,
    divergentes: p.conferencia.filter(c=>c.status==='divergente').map(c=>({
      cod: ped.itens[c.idx].cod,
      desc: ped.itens[c.idx].desc,
      esperado: ped.itens[c.idx].qtd,
      conferido: c.qtdConferida
    })),
    naoConferidos: p.conferencia.filter(c=>c.status==='pendente').map(c=>({
      cod: ped.itens[c.idx].cod,
      desc: ped.itens[c.idx].desc,
      esperado: ped.itens[c.idx].qtd
    }))
  });

  // Guarda no máximo 50 conferências
  localStorage.setItem(HIST_KEY, JSON.stringify(hist.slice(0, 50)));
}

function carregarHistorico() {
  try { return JSON.parse(localStorage.getItem(HIST_KEY)) || []; }

// ── WHATSAPP ─────────────────────────────────────────
let waPayload = '';

function gerarTextoWA(p_or_h, isHist=false) {
  const h = isHist ? p_or_h : null;
  const seq       = isHist ? h.seq : p_or_h.pedido.seq;
  const cliente   = isHist ? h.cliente : p_or_h.pedido.cliente;
  const vendedor  = isHist ? h.vendedor : p_or_h.pedido.vendedor;
  const conf      = isHist ? h.conferente : p_or_h.conferente;
  const volumes   = isHist ? h.volumes : p_or_h.volumes;
  const ok        = isHist ? h.ok : p_or_h.conferencia.filter(c=>c.status==='ok').length;
  const dv        = isHist ? h.dv : p_or_h.conferencia.filter(c=>c.status==='divergente').length;
  const pend      = isHist ? h.pend : p_or_h.conferencia.filter(c=>c.status==='pendente').length;
  const total     = isHist ? h.totalItens : p_or_h.pedido.itens.length;
  const acerto    = total > 0 ? Math.round(ok/total*100) : 0;
  const dtFim     = isHist ? new Date(h.dtFim) : p_or_h.dtFim;
  const dtIni     = isHist ? new Date(h.dtInicio) : p_or_h.dtInicio;
  const dur       = dtFim && dtIni ? Math.floor((dtFim-dtIni)/1000) : 0;
  const durStr    = `${Math.floor(dur/60)}m ${dur%60}s`;
  const totalVal  = isHist ? h.total : p_or_h.pedido.total;

  const diverg = isHist ? h.divergentes : p_or_h.conferencia.filter(c=>c.status==='divergente').map(c=>({
    desc: p_or_h.pedido.itens[c.idx].desc, esperado: p_or_h.pedido.itens[c.idx].qtd, conferido: c.qtdConferida
  }));

  let txt = `✅ *ConfereSmart — Relatório de Conferência*\n`;
  txt += `━━━━━━━━━━━━━━━━━━━━\n`;
  txt += `📋 *Pedido:* #${seq}\n`;
  txt += `👤 *Cliente:* ${cliente}\n`;
  txt += `🛒 *Vendedor:* ${vendedor}\n`;
  txt += `👷 *Conferente:* ${conf||'—'}\n`;
  txt += `📦 *Volumes:* ${volumes||'—'}\n`;
  txt += `📅 *Data:* ${dtFim?.toLocaleDateString('pt-BR')} ${dtFim?.toLocaleTimeString('pt-BR')}\n`;
  txt += `⏱ *Duração:* ${durStr}\n`;
  txt += `━━━━━━━━━━━━━━━━━━━━\n`;
  txt += `📊 *Resultado*\n`;
  txt += `• Total de itens: ${total}\n`;
  txt += `• ✅ Conferidos OK: ${ok}\n`;
  if (dv > 0) txt += `• ⚠️ Divergentes: ${dv}\n`;
  if (pend > 0) txt += `• ❌ Não conferidos: ${pend}\n`;
  txt += `• 🎯 Taxa de acerto: ${acerto}%\n`;
  txt += `• 💰 Total do pedido: R$ ${totalVal?.toFixed(2)}\n`;
  if (diverg?.length > 0) {
    txt += `━━━━━━━━━━━━━━━━━━━━\n`;
    txt += `⚠️ *Divergências*\n`;
    diverg.slice(0,10).forEach(d => {
      txt += `• ${d.desc.substring(0,35)} — Esp: ${d.esperado} / Conf: ${d.conferido}\n`;
    });
    if (diverg.length > 10) txt += `• ...e mais ${diverg.length-10} item(ns)\n`;
  }
  txt += `━━━━━━━━━━━━━━━━━━━━\n`;
  txt += `_Enviado pelo ConfereSmart_ 📱`;
  return txt;
}

function abrirWA(pedido) {
  waPayload = gerarTextoWA(pedido, false);

// Vibração
function vibrar(tipo='ok'){
  if(!navigator.vibrate) return;

  if(tipo==='ok'){
    navigator.vibrate(80);
  }else{
    navigator.vibrate([120,60,120]);
  }
}

// Som simples
function beep(freq=600,duration=120){
  try{
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();

    osc.type = 'sine';
    osc.frequency.value = freq;

    osc.connect(gain);
    gain.connect(ctx.destination);

    osc.start();

    gain.gain.exponentialRampToValueAtTime(
      0.0001,
      ctx.currentTime + duration/1000
    );

    osc.stop(ctx.currentTime + duration/1000);
  }catch(e){}
}

// ── LEITOR EXTERNO USB/BLUETOOTH ────────────────────────────────────────────
// Leitores externos emulam teclado: digitam código + Enter rapidamente
// Funciona em tablets, PCs e celulares com leitor Bluetooth
(function() {
  let buffer = '';
  let lastKey = 0;
  const VELOCIDADE_LEITOR = 60; // ms — leitor digita mais rápido que humano

  document.addEventListener('keydown', function(e) {
    // Se o scanner está aberto e há um campo focado que não é o manual, ignora
    const scanModal = document.getElementById('scan-modal');
    const modalAberto = scanModal && scanModal.classList.contains('open');
    const manualFocado = document.activeElement &&
      document.activeElement.id === 'scan-manual-input';

    const agora = Date.now();
    const intervalo = agora - lastKey;
    lastKey = agora;

    // Enter = submete o buffer se foi digitado rapidamente (leitor)
    if (e.key === 'Enter') {
      if (buffer.length >= 4 && intervalo < VELOCIDADE_LEITOR * 2) {
        const cod = buffer.trim();
        buffer = '';
        e.preventDefault();

        // Se modal do scanner está aberto, processa como código de barras
        if (modalAberto) {
          if (document.getElementById('scan-confirma').style.display === 'none') {
            processarCodigo(cod);
          }
        } else {
          // Scanner fechado mas há pedido ativo — abre confirma direto
          const p = getPed();
          if (p && p.iniciado && !p.finalizado) {
            // Abre scanner se não estiver aberto
            if (!modalAberto) {
              processarCodigoExterno(cod);
            }
          }
        }
        return;
      }
      buffer = '';
      return;
    }

    // Acumula caracteres se rápido (leitor) OU se campo manual está focado
    if (e.key.length === 1) {
      if (intervalo < VELOCIDADE_LEITOR || manualFocado) {
        if (!manualFocado) {
          e.preventDefault();
          buffer += e.key;
        }
        // Se campo manual focado, deixa o browser lidar normalmente
      } else {
        // Digitação humana — limpa buffer
        buffer = e.key;
      }
    }
  });

  // Processa código vindo de leitor externo sem o scanner aberto
  window.processarCodigoExterno = function(cod) {
    const p = getPed();
    if (!p || !p.iniciado || p.finalizado) {
      showToast('Inicie a conferência primeiro', 'warn');
      return;
    }
    // Abre modal scanner e processa
    abrirScanner().then(() => {
      setTimeout(() => processarCodigo(cod), 300);
    });
  };
})();
